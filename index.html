<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBChat WhatsApp Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div id="page-login" class="page">
        <div class="auth-container">
            <h2>SBChat Pro</h2>
            <p>Créez votre compte pour rejoindre le groupe unique</p>
            <input type="tel" id="auth-phone" placeholder="Numéro (ex: 00229...)" required>
            <input type="email" id="auth-email" placeholder="Email" required>
            <input type="password" id="auth-password" placeholder="Mot de passe" required>
            <button onclick="handleAuth()">Se connecter / S'inscrire</button>
        </div>
    </div>

    <div id="page-chat" class="page" style="display:none;">
        <div id="groupChoice">
            <b id="welcomeText">Salut Gis !</b>
        </div>

        <div class="header">
            <div id="inboxBtn" onclick="showView('page-inbox')">
                ✉️<span id="inboxCount">0</span>
            </div>
            
            <b id="groupTitle">Groupe Officiel</b>
            
            <div id="adminMenuBtn" onclick="toggleMenu()">⋮</div>
            <div id="adminDropdown" class="dropdown-content">
                <button onclick="showView('page-members')">👥 Liste des membres</button>
                <button onclick="showView('page-broadcast')">📢 Diffusion à tous</button>
                <button onclick="exporterContacts()">📥 Exporter EXCEL (XLS)</button>
                <button onclick="handleLogout()" style="color:red;">🚪 Déconnexion</button>
            </div>
        </div>
        
        <div class="messages" id="chat-box"></div>

        <div id="reply-preview">
            <span id="reply-text"></span>
            <button onclick="cancelReply()">✕</button>
        </div>
        
        <div class="input-area-container">
            <div class="input-area">
                <label for="file-input" class="file-label">📷</label>
                <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFileSelect()">
                
                <input id="msgInput" placeholder="Tapez votre message ici...">
                <button id="sendBtn" onclick="handleSend()">➤</button>
            </div>
        </div>
    </div>

    <div id="page-members" class="page" style="display:none;">
        <div class="header">
            <button onclick="showView('page-chat')" style="background:none; border:none; color:white; font-size:20px; position:absolute; left:20px;">⬅</button>
            <b>Membres</b>
        </div>
        <div id="members-list" class="messages"></div>
    </div>

    <div id="page-inbox" class="page" style="display:none;">
        <div class="header">
            <button onclick="showView('page-chat')" style="background:none; border:none; color:white; font-size:20px; position:absolute; left:20px;">⬅</button>
            <b>Mes Messages Privés</b>
        </div>
        <div id="inbox-list" class="messages"></div>
    </div>

    <div id="page-editor" class="page" style="display:none;">
        <div class="header">
            <button onclick="showView('page-chat')" style="background:none; border:none; color:white; font-size:20px; position:absolute; left:20px;">⬅</button>
            <b id="editor-title">Nouveau Message</b>
        </div>
        <div class="auth-container">
            <input type="text" id="edit-dest-phone" readonly style="background:#eee;">
            <textarea id="edit-msg" placeholder="Votre message..." style="width:80%; height:100px; border-radius:10px; padding:10px;"></textarea>
            <label for="edit-file" style="margin-top:10px; cursor:pointer;">📷 Ajouter une photo</label>
            <input type="file" id="edit-file" accept="image/*" style="display:none;">
            <button onclick="executeSendPrivate()">ENVOYER</button>
        </div>
    </div>

    <script src="script.js" defer></script>

</body>
</html>
