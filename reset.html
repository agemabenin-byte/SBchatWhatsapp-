<!-- Cette page s'occope de la réinitialisation de mot de passe-->

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation - SuccesBonheur</title>
    <link rel="stylesheet" href="reset.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="reset-container">
        <div class="header-reset">
            SuccesBonheur Pro
        </div>
        
        <div class="form-body">
            <p>Sécurité de votre compte :<br>Veuillez choisir un nouveau mot de passe robuste.</p>
            
            <input type="password" id="new-password" placeholder="Nouveau mot de passe">
            
            <button onclick="updateNow()" id="btnUpdate">
                MODIFIER LE MOT DE PASSE
            </button>
            
            <div id="status-msg"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jukfjoljkaoeicopjuwo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_zvBTaDrffaATEPI7Wbu4OQ_w8ZR6chX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function updateNow() {
            const newPassword = document.getElementById('new-password').value;
            const msg = document.getElementById('status-msg');
            const btn = document.getElementById('btnUpdate');

            if (newPassword.length < 6) {
                alert("Le mot de passe doit faire au moins 6 caractères.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Traitement en cours...";

            const { error } = await _supabase.auth.updateUser({ password: newPassword });

            if (error) {
                msg.style.color = "#d32f2f";
                msg.innerText = "❌ Erreur : " + error.message;
                btn.disabled = false;
                btn.innerText = "RÉESSAYER";
            } else {
                msg.style.color = "#2e7d32";
                msg.innerText = "✅ Succès ! Redirection vers la connexion...";
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2500);
            }
        }
    </script>
</body>
</html>
